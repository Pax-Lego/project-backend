services:
  db:
    image: postgres:15-alpine
    container_name: calorie_tracker_db
    environment:
      POSTGRES_DB: ${DB_NAME:-calorie_tracker}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: calorie_tracker_web
    command: sh -c "python manage.py migrate && python manage.py loaddata apps/ingredients/fixtures/ingredients.json apps/recipes/fixtures/recipes.json && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-calorie_tracker}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      DEBUG: ${DEBUG:-True}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-in-production}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
