version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ingesoft1_db
      POSTGRES_USER: ingesoft1_user
      POSTGRES_PASSWORD: ingesoft123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ingesoft1_user -d ingesoft1_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
